<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Diary — เขียนบันทึก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:      #FBF8F3;
    --paper-deep: #F3EEE5;
    --ink:        #3D3548;
    --ink-soft:   #7A7186;
    --ink-faint:  #B8B0C2;
    --line:       #EDE5DC;
    --rose:       #D14F86;
    --rose-mid:   #C93E7A;
    --rose-soft:  rgba(209,79,134,.15);
    --rose-tint:  #FBEAF1;
    --sage:       #7E9E7C;
    --sage-tint:  #EAF0E7;
    --gold:       #CC9A3A;
    --gold-tint:  #FAF1DC;
    --radius:     20px;
    --shadow:     0 20px 56px -20px rgba(61,53,72,.42);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    font-family:'IBM Plex Sans Thai', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #EAE0EC 0%, transparent 55%),
      radial-gradient(1000px 700px at -10% 110%, #DCE7EC 0%, transparent 55%),
      #ECE7E0;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Phone frame ── */
  .phone {
    width:392px; max-width:100%; height:812px; max-height:92vh;
    background:var(--paper);
    border-radius:40px; overflow:hidden; position:relative;
    box-shadow:var(--shadow), 0 0 0 8px #fff, 0 0 0 9px #E1D9CD;
    display:flex; flex-direction:column;
  }

  /* ════════════════════════════════
     COMPOSER HEADER
  ════════════════════════════════ */
  .cmp-head {
    flex:none;
    background:linear-gradient(160deg, #ff00ff6b 0%, #1e83ff87 55%, #00ffff85 100%);
    padding:16px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  .cmp-head-row {
    display:flex; align-items:center; gap:8px;
  }
  .btn-back {
    width:36px; height:36px; flex:none;
    border:none; border-radius:50%; background:rgba(61,53,72,.08);
    font-size:18px; cursor:pointer; display:grid; place-items:center;
    color:var(--ink); transition:background .18s, transform .15s;
  }
  .btn-back:hover  { background:rgba(61,53,72,.14); }
  .btn-back:active { transform:scale(.91); }
  .cmp-title {
    flex:1; text-align:center;
    font-family:'Mali', cursive; font-size:17px; font-weight:700;
    color:var(--ink);
  }
  .btn-save {
    height:34px; min-width:72px; padding:0 16px;
    border:none; border-radius:18px; cursor:pointer;
    font-family:'IBM Plex Sans Thai', sans-serif;
    font-size:13px; font-weight:700;
    background:var(--ink-faint); color:rgba(255,255,255,.7);
    transition:background .2s, color .2s, transform .15s, box-shadow .15s;
    pointer-events:none;
  }
  .btn-save.ready {
    background:linear-gradient(145deg, #E0609A, var(--rose-mid));
    color:#fff; pointer-events:all;
    box-shadow:0 8px 20px -6px rgba(209,79,134,.45);
  }
  .btn-save.ready:hover  { transform:translateY(-1px); box-shadow:0 12px 24px -6px rgba(209,79,134,.55); }
  .btn-save.ready:active { transform:scale(.97); }

  .cmp-date {
    margin-top:8px;
    font-size:12px; color:var(--ink-soft); letter-spacing:.3px;
  }

  /* ════════════════════════════════
     SCROLLABLE FORM BODY
  ════════════════════════════════ */
  .cmp-body {
    flex:1; overflow-y:auto; padding:14px 16px 32px;
     background:linear-gradient(160deg, #9e93ff23 0%, #1e83ff23 55%, #00ffff1f 100%);
  }
  .cmp-body::-webkit-scrollbar { width:0; }

  /* ── Section label ── */
  .sec-lbl {
    font-size:10.5px; font-weight:700; letter-spacing:.5px;
    color:var(--ink-faint); text-transform:uppercase;
    margin-bottom:8px; margin-top:18px;
    display:flex; align-items:center; gap:6px;
  }
  .sec-lbl:first-child { margin-top:4px; }
  .sec-req {
    font-size:9px; background:var(--rose-soft);
    color:var(--rose); border-radius:6px; padding:1px 5px;
    font-weight:700; text-transform:none; letter-spacing:0;
  }
  .sec-opt {
    font-size:9px; background:rgba(61,53,72,.07);
    color:var(--ink-soft); border-radius:6px; padding:1px 5px;
    font-weight:600; text-transform:none; letter-spacing:0;
  }

  /* ════════════════════════════════
     MOOD ROW (inline, pre-filled)
  ════════════════════════════════ */
  .mood-row {
    display:flex; gap:8px; padding:2px 0 4px;
  }
  .mood-btn {
    flex:1; border:2px solid var(--line); border-radius:16px;
    background:#fff; padding:9px 4px 7px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    cursor:pointer; font-family:inherit;
    transition:border-color .18s, background .18s, transform .15s, box-shadow .15s;
    touch-action:manipulation;
  }
  .mood-btn:hover  { border-color:var(--rose-soft); background:var(--rose-tint); transform:translateY(-1px); }
  .mood-btn:active { transform:scale(.94); }
  .mood-btn .mb-ico { font-size:26px; line-height:1.1; }
  .mood-btn .mb-lbl { font-size:9.5px; color:var(--ink-soft); font-weight:500; }
  .mood-btn[aria-pressed="true"] {
    border-color:var(--rose); background:var(--rose-tint);
    box-shadow:0 4px 14px -4px rgba(209,79,134,.35);
    transform:translateY(-2px);
  }
  .mood-btn[aria-pressed="true"] .mb-lbl { color:var(--rose); font-weight:700; }
  .mood-btn[aria-pressed="true"] .mb-ico  { filter:drop-shadow(0 2px 4px rgba(209,79,134,.25)); }

  /* ════════════════════════════════
     ACTIVITY CHIPS (wrap)
  ════════════════════════════════ */
  .act-wrap {
    display:flex; gap:7px; flex-wrap:wrap; padding:2px 0 4px;
  }
  .act-chip {
    flex:none; border:1.5px solid var(--line); border-radius:18px;
    background:#fff; padding:7px 11px;
    display:flex; align-items:center; gap:5px;
    font-family:'IBM Plex Sans Thai', sans-serif; font-size:12.5px;
    color:var(--ink); font-weight:500; cursor:pointer;
    transition:border-color .18s, background .18s, transform .15s;
    white-space:nowrap; touch-action:manipulation;
  }
  .act-chip:hover  { border-color:var(--rose-soft); background:var(--rose-tint); transform:translateY(-1px); }
  .act-chip:active { transform:scale(.95); }
  .act-chip .ac-ico { font-size:15px; line-height:1; }
  .act-chip[aria-pressed="true"] {
    border-color:var(--rose); background:var(--rose-tint);
    color:var(--rose); font-weight:700;
    box-shadow:0 4px 12px -4px rgba(209,79,134,.3);
  }

  /* ════════════════════════════════
     TEXT FIELDS
  ════════════════════════════════ */
  .field-wrap {
    background:#fff; border:1.5px solid var(--line);
    border-radius:var(--radius); overflow:hidden;
    transition:border-color .2s, box-shadow .2s;
  }
  .field-wrap:focus-within {
    border-color:rgba(209,79,134,.4);
    box-shadow:0 0 0 3px rgba(209,79,134,.08);
  }
  .field-title {
    width:100%; border:none; outline:none; padding:14px 16px;
    font-family:'Mali', cursive; font-size:16px; font-weight:600;
    color:var(--ink);
     background:#a0aff263;
    line-height:1.4;
  }
  .field-title::placeholder { color:var(--ink-faint); font-weight:400; }

  .field-divider { height:1px; background:var(--line); margin:0 16px; }

  .field-desc {
    width:100%; border:none; outline:none;
    padding:12px 16px 14px; resize:none;
    font-family:'IBM Plex Sans Thai', sans-serif; font-size:14px;
    color:var(--ink);
     background:#d1d4fa63;
      min-height:120px;
    line-height:1.7;
  }
  .field-desc::placeholder { color:var(--ink-faint); }

  /* char counter */
  .field-footer {
    display:flex; align-items:center; justify-content:flex-end;
    padding:6px 14px 10px; gap:10px;
  }
  .char-count { font-size:10.5px; color:var(--ink-faint); }

  /* ════════════════════════════════
     OPTIONAL ACTIONS ROW
  ════════════════════════════════ */
  .opt-row {
    display:flex; gap:8px; margin-top:4px;
  }
  .opt-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;
    background:#fff; border:1.5px solid var(--line); border-radius:16px;
    padding:12px 8px; cursor:pointer; font-family:inherit;
    transition:border-color .18s, background .18s, transform .15s;
    touch-action:manipulation;
  }
  .opt-btn:hover  { border-color:rgba(209,79,134,.3); background:var(--rose-tint); transform:translateY(-1px); }
  .opt-btn:active { transform:scale(.96); }
  .opt-btn.active { border-color:var(--rose); background:var(--rose-tint); }
  .opt-ico { font-size:22px; line-height:1; }
  .opt-lbl { font-size:10px; font-weight:600; color:var(--ink-soft); text-align:center; line-height:1.3; }
  .opt-btn.active .opt-lbl { color:var(--rose); }

  /* ── location pill (shown after check-in) ── */
  .loc-pill {
    display:none; align-items:center; gap:7px;
    background:var(--sage-tint); border:1.5px solid #C5DEC2;
    border-radius:20px; padding:8px 14px; margin-top:8px;
    font-size:12.5px; color:var(--sage); font-weight:600;
    cursor:pointer; transition:background .18s;
  }
  .loc-pill.on { display:flex; }
  .loc-pill:hover { background:#D8EDD6; }
  .loc-pill-ico { font-size:16px; }
  .loc-pill-txt { flex:1; }
  .loc-pill-x { font-size:14px; opacity:.55; }

  /* ── photo grid ── */
  .photo-grid {
    display:none; flex-wrap:wrap; gap:8px; margin-top:8px;
  }
  .photo-grid.on { display:flex; }
  .photo-thumb {
    width:72px; height:72px; border-radius:12px;
    object-fit:cover; border:2.5px solid #fff;
    box-shadow:0 4px 12px -4px rgba(61,53,72,.2);
  }
  .photo-add {
    width:72px; height:72px; border-radius:12px;
    border:2px dashed var(--line); background:var(--paper-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; color:var(--ink-faint);
    transition:border-color .18s, background .18s;
  }
  .photo-add:hover { border-color:var(--rose-soft); background:var(--rose-tint); }

  /* ── expense field ── */
  .expense-field {
    display:none; margin-top:8px;
    background:#fff; border:1.5px solid var(--line);
    border-radius:16px; padding:12px 16px;
    align-items:center; gap:10px;
    transition:border-color .2s, box-shadow .2s;
  }
  .expense-field.on { display:flex; }
  .expense-field:focus-within { border-color:rgba(204,154,58,.4); box-shadow:0 0 0 3px rgba(204,154,58,.08); }
  .exp-ico  { font-size:20px; }
  .exp-symbol { font-size:16px; font-weight:700; color:var(--gold); }
  .exp-input {
    flex:1; border:none; outline:none; background:transparent;
    font-family:'IBM Plex Sans Thai', sans-serif; font-size:16px;
    font-weight:700; color:var(--ink);
  }
  .exp-input::placeholder { color:var(--ink-faint); font-weight:400; font-size:14px; }
  .exp-unit { font-size:12px; color:var(--ink-faint); font-weight:500; }

  /* ════════════════════════════════
     BOTTOM SAVE BUTTON
  ════════════════════════════════ */
  .cmp-footer {
    flex:none; padding:10px 16px 20px;
    background:linear-gradient(to top, var(--paper) 70%, transparent);
    border-top:1px solid var(--line);
  }
  .btn-save-main {
    width:100%; border:none; cursor:pointer; border-radius:22px;
    padding:15px 24px;
    font-family:'Mali', cursive; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition:transform .15s, box-shadow .15s, background .25s;
  }
  .btn-save-main.disabled {
    background:var(--line); color:var(--ink-faint); pointer-events:none;
  }
  .btn-save-main.ready {
    background:linear-gradient(145deg, #E0609A, var(--rose-mid));
    color:#fff;
    box-shadow:0 14px 30px -8px rgba(209,79,134,.5);
  }
  .btn-save-main.ready:hover  { transform:translateY(-2px); box-shadow:0 18px 36px -8px rgba(209,79,134,.62); }
  .btn-save-main.ready:active { transform:scale(.97); }
  .save-ico { font-size:20px; }

  /* ── success overlay ── */
  .success-overlay {
    position:absolute; inset:0; z-index:30;
    background:linear-gradient(160deg, #FBEAF1, #EEE4F8);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; opacity:0; pointer-events:none;
    transition:opacity .4s ease;
  }
  .success-overlay.on { opacity:1; pointer-events:all; }
  .success-ico  { font-size:64px; animation:popIn .4s cubic-bezier(.2,1.5,.5,1); }
  .success-title { font-family:'Mali',cursive; font-size:22px; font-weight:700; color:var(--ink); }
  .success-sub   { font-size:14px; color:var(--ink-soft); }
  .success-btn {
    margin-top:8px; border:none; cursor:pointer;
    background:linear-gradient(145deg, #E0609A, var(--rose-mid));
    color:#fff; border-radius:20px; padding:12px 28px;
    font-family:'Mali',cursive; font-size:16px; font-weight:700;
    box-shadow:0 10px 24px -6px rgba(209,79,134,.45);
    transition:transform .15s;
  }
  .success-btn:hover  { transform:translateY(-2px); }
  .success-btn:active { transform:scale(.97); }
  @keyframes popIn {
    from { transform:scale(.4); opacity:0; }
    to   { transform:scale(1);  opacity:1; }
  }
</style>
</head>
<body>

<div class="phone">

  <!-- ════════════ HEADER ════════════ -->
  <header class="cmp-head">
    <div class="cmp-head-row">
      <button class="btn-back" id="btnBack" onclick="history.back()" title="กลับ">‹</button>
      <span class="cmp-title">เขียนบันทึก</span>
      <button class="btn-save" id="btnSaveTop">บันทึก</button>
    </div>
    <div class="cmp-date" id="cmpDate"></div>
  </header>

  <!-- ════════════ FORM BODY ════════════ -->
  <div class="cmp-body" id="cmpBody">

    <!-- ── 1. ความรู้สึกวันนี้ (required) ── -->
    <div class="sec-lbl">
      ความรู้สึกวันนี้
      <span class="sec-req">จำเป็น</span>
    </div>
    <div class="mood-row" id="moodRow" role="group" aria-label="เลือกความรู้สึก">
      <button class="mood-btn" data-mood="great" data-emoji="😄" data-label="ดีมาก" aria-pressed="false">
        <span class="mb-ico">😄</span><span class="mb-lbl">ดีมาก</span>
      </button>
      <button class="mood-btn" data-mood="good"  data-emoji="😊" data-label="ดี" aria-pressed="false">
        <span class="mb-ico">😊</span><span class="mb-lbl">ดี</span>
      </button>
      <button class="mood-btn" data-mood="ok"    data-emoji="😐" data-label="สบายๆ" aria-pressed="false">
        <span class="mb-ico">😐</span><span class="mb-lbl">สบายๆ</span>
      </button>
      <button class="mood-btn" data-mood="tired" data-emoji="😔" data-label="เหนื่อย" aria-pressed="false">
        <span class="mb-ico">😔</span><span class="mb-lbl">เหนื่อย</span>
      </button>
      <button class="mood-btn" data-mood="fight" data-emoji="😞" data-label="สู้ๆ" aria-pressed="false">
        <span class="mb-ico">😞</span><span class="mb-lbl">สู้ๆ</span>
      </button>
    </div>

    <!-- ── 2. วันนี้ทำอะไร (required) ── -->
    <div class="sec-lbl" style="margin-top:16px;">
      วันนี้ทำอะไร
      <span class="sec-req">จำเป็น</span>
    </div>
    <div class="act-wrap" id="actWrap" role="group" aria-label="เลือกกิจกรรม">
      <button class="act-chip" data-ico="🏢" data-label="ทำงาน"       aria-pressed="false"><span class="ac-ico">🏢</span>ทำงาน</button>
      <button class="act-chip" data-ico="🏪" data-label="เปิดร้าน"    aria-pressed="false"><span class="ac-ico">🏪</span>เปิดร้าน</button>
      <button class="act-chip" data-ico="🌴" data-label="วันหยุด"     aria-pressed="false"><span class="ac-ico">🌴</span>วันหยุด</button>
      <button class="act-chip" data-ico="👨‍👩‍👧" data-label="พาครอบครัว" aria-pressed="false"><span class="ac-ico">👨‍👩‍👧</span>พาครอบครัว</button>
      <button class="act-chip" data-ico="✈️" data-label="ไปทริป"      aria-pressed="false"><span class="ac-ico">✈️</span>ไปทริป</button>
      <button class="act-chip" data-ico="🎉" data-label="เทศกาล"     aria-pressed="false"><span class="ac-ico">🎉</span>เทศกาล</button>
      <button class="act-chip" data-ico="📚" data-label="เรียน/อบรม" aria-pressed="false"><span class="ac-ico">📚</span>เรียน/อบรม</button>
      <button class="act-chip" data-ico="🏠" data-label="อยู่บ้าน"   aria-pressed="false"><span class="ac-ico">🏠</span>อยู่บ้าน</button>
      <button class="act-chip" data-ico="💪" data-label="ออกกำลัง"   aria-pressed="false"><span class="ac-ico">💪</span>ออกกำลัง</button>
      <button class="act-chip" data-ico="🏥" data-label="นัดหมอ"     aria-pressed="false"><span class="ac-ico">🏥</span>นัดหมอ</button>
      <button class="act-chip" data-ico="🛒" data-label="ช็อปปิ้ง"   aria-pressed="false"><span class="ac-ico">🛒</span>ช็อปปิ้ง</button>
      <button class="act-chip" data-ico="🍽️" data-label="กินข้าวนอก" aria-pressed="false"><span class="ac-ico">🍽️</span>กินข้าวนอก</button>
    </div>

    <!-- ── 3+4. หัวข้อ + เรื่องราว (required) ── -->
    <div class="sec-lbl" style="margin-top:16px;">
      เรื่องราววันนี้
      <span class="sec-req">จำเป็น</span>
    </div>
    <div class="field-wrap">
      <input  class="field-title" id="fTitle"
              placeholder="หัวข้อ — วันนี้เป็นอย่างไรบ้าง?"
              maxlength="80" autocomplete="off" spellcheck="false">
      <div class="field-divider"></div>
      <textarea class="field-desc" id="fDesc"
                placeholder="เล่าเรื่องราว ความรู้สึก หรือสิ่งที่อยากจำไว้...&#10;ไม่ต้องสวยหรู เขียนตามใจได้เลย 💬"
                rows="5"></textarea>
      <div class="field-footer">
        <span class="char-count" id="charCount">0 / 1000</span>
      </div>
    </div>

    <!-- ── 5–7. Optional actions ── -->
    <div class="sec-lbl" style="margin-top:16px;">
      เพิ่มเติม
      <span class="sec-opt">ไม่บังคับ</span>
    </div>
    <div class="opt-row">
      <button class="opt-btn" id="optLoc">
        <span class="opt-ico">📍</span>
        <span class="opt-lbl">เช็คอิน<br>สถานที่</span>
      </button>
      <button class="opt-btn" id="optPhoto">
        <span class="opt-ico">📷</span>
        <span class="opt-lbl">เพิ่ม<br>รูปภาพ</span>
      </button>
      <button class="opt-btn" id="optExp">
        <span class="opt-ico">💰</span>
        <span class="opt-lbl">บันทึก<br>ค่าใช้จ่าย</span>
      </button>
    </div>

    <!-- Location pill -->
    <div class="loc-pill" id="locPill">
      <span class="loc-pill-ico">📍</span>
      <span class="loc-pill-txt" id="locText">โคราช, ไทย</span>
      <span class="loc-pill-x" id="locRemove">✕</span>
    </div>

    <!-- Photo grid -->
    <div class="photo-grid" id="photoGrid">
      <div class="photo-add" id="photoAddBtn" title="เพิ่มรูป">＋</div>
    </div>

    <!-- Expense field -->
    <div class="expense-field" id="expField">
      <span class="exp-ico">💰</span>
      <span class="exp-symbol">฿</span>
      <input class="exp-input" id="expInput" type="number" min="0" step="1"
             placeholder="ระบุค่าใช้จ่าย" inputmode="decimal">
      <span class="exp-unit">บาท</span>
    </div>

  </div><!-- /cmp-body -->

  <!-- ════════════ FOOTER SAVE ════════════ -->
  <footer class="cmp-footer">
    <button class="btn-save-main disabled" id="btnSaveMain">
      <span class="save-ico">💾</span> บันทึกไว้ในสมุด
    </button>
  </footer>

  <!-- ── Success overlay ── -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-ico">🎉</div>
    <div class="success-title">บันทึกเรียบร้อยแล้ว!</div>
    <div class="success-sub">เรื่องราววันนี้ถูกเก็บไว้ในสมุดชีวิตแล้วครับ</div>
    <button class="success-btn" onclick="goHome()">กลับหน้าแรก</button>
  </div>

</div><!-- /phone -->

<script>
/* ══════════════════════════════════════
   DATE DISPLAY
══════════════════════════════════════ */
const DAYS  = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const now = new Date();
const buddhistYear = now.getFullYear() + 543;
const timeStr = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
document.getElementById('cmpDate').textContent =
  `วัน${DAYS[now.getDay()]}ที่ ${now.getDate()} ${MONTHS[now.getMonth()]} ${buddhistYear} · ${timeStr} น.`;

/* ══════════════════════════════════════
   PRE-FILL FROM HOME (URL params)
══════════════════════════════════════ */
const params = new URLSearchParams(location.search);
const preMood = params.get('mood');  /* e.g. ?mood=good&act=shop */
const preAct  = params.get('act');

if (preMood) {
  const mBtn = document.querySelector(`[data-mood="${preMood}"]`);
  if (mBtn) mBtn.setAttribute('aria-pressed','true');
}
if (preAct) {
  const aBtn = document.querySelector(`[data-label="${decodeURIComponent(preAct)}"]`);
  if (aBtn) aBtn.setAttribute('aria-pressed','true');
}

/* ══════════════════════════════════════
   MOOD PICKER — single select
══════════════════════════════════════ */
const moodBtns = document.querySelectorAll('#moodRow .mood-btn');
moodBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    moodBtns.forEach(b => b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true');
    checkReady();
  });
});

/* ══════════════════════════════════════
   ACTIVITY CHIPS — single select
══════════════════════════════════════ */
const actChips = document.querySelectorAll('#actWrap .act-chip');
actChips.forEach(btn => {
  btn.addEventListener('click', () => {
    const wasOn = btn.getAttribute('aria-pressed') === 'true';
    actChips.forEach(b => b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed', wasOn ? 'false' : 'true');
    checkReady();
  });
});

/* ══════════════════════════════════════
   TEXT FIELDS — char count + ready check
══════════════════════════════════════ */
const fTitle   = document.getElementById('fTitle');
const fDesc    = document.getElementById('fDesc');
const charCount = document.getElementById('charCount');

fTitle.addEventListener('input', checkReady);
fDesc.addEventListener('input', () => {
  const len = fDesc.value.length;
  charCount.textContent = `${len} / 1000`;
  if (len > 900) charCount.style.color = 'var(--rose)';
  else charCount.style.color = 'var(--ink-faint)';
  if (len > 1000) fDesc.value = fDesc.value.slice(0, 1000);
  checkReady();
});

/* ══════════════════════════════════════
   READY CHECK — all required fields
══════════════════════════════════════ */
function isReady() {
  const moodOk = !!document.querySelector('#moodRow .mood-btn[aria-pressed="true"]');
  const actOk  = !!document.querySelector('#actWrap .act-chip[aria-pressed="true"]');
  const titleOk = fTitle.value.trim().length > 0;
  const descOk  = fDesc.value.trim().length > 0;
  return moodOk && actOk && titleOk && descOk;
}
function checkReady() {
  const ready = isReady();
  const topBtn  = document.getElementById('btnSaveTop');
  const mainBtn = document.getElementById('btnSaveMain');
  topBtn.classList.toggle('ready', ready);
  mainBtn.classList.toggle('ready', !ready ? false : true);
  mainBtn.classList.toggle('disabled', !ready);
}
/* run once on load (pre-fill might already satisfy mood/act) */
checkReady();

/* ══════════════════════════════════════
   OPTIONAL: LOCATION
══════════════════════════════════════ */
const optLoc  = document.getElementById('optLoc');
const locPill = document.getElementById('locPill');
const locRemove = document.getElementById('locRemove');

optLoc.addEventListener('click', () => {
  optLoc.classList.toggle('active');
  const on = optLoc.classList.contains('active');
  locPill.classList.toggle('on', on);
  optLoc.querySelector('.opt-ico').textContent = on ? '📍' : '📍';
});
locRemove.addEventListener('click', e => {
  e.stopPropagation();
  locPill.classList.remove('on');
  optLoc.classList.remove('active');
});

/* simulate geolocation fill */
optLoc.addEventListener('click', () => {
  if (optLoc.classList.contains('active')) {
    document.getElementById('locText').textContent = 'กำลังหาตำแหน่ง...';
    setTimeout(() => {
      document.getElementById('locText').textContent = 'โคราช, ไทย';
    }, 900);
  }
});

/* ══════════════════════════════════════
   OPTIONAL: PHOTO
══════════════════════════════════════ */
const optPhoto   = document.getElementById('optPhoto');
const photoGrid  = document.getElementById('photoGrid');
const photoAddBtn = document.getElementById('photoAddBtn');

/* demo photo URLs */
const DEMO_PHOTOS = [
  'https://i.pinimg.com/736x/a0/bf/39/a0bf392c595db35dd9b6f3f4881dfd23.jpg',
  'https://i.pinimg.com/736x/1a/ec/a0/1aeca0e90fcbceb832342f7b2661ec96.jpg',
  'https://i.pinimg.com/736x/e0/b8/7c/e0b87cf298f804a3de97bfbbf8fefdbd.jpg',
];
let photoCount = 0;

optPhoto.addEventListener('click', () => {
  if (!photoGrid.classList.contains('on')) {
    photoGrid.classList.add('on');
    optPhoto.classList.add('active');
  }
});
photoAddBtn.addEventListener('click', () => {
  if (photoCount >= DEMO_PHOTOS.length) return;
  const img = document.createElement('img');
  img.className = 'photo-thumb';
  img.src = DEMO_PHOTOS[photoCount++];
  img.alt = `รูปภาพ ${photoCount}`;
  photoGrid.insertBefore(img, photoAddBtn);
  if (photoCount >= DEMO_PHOTOS.length) photoAddBtn.style.display = 'none';
});

/* ══════════════════════════════════════
   OPTIONAL: EXPENSE
══════════════════════════════════════ */
const optExp   = document.getElementById('optExp');
const expField = document.getElementById('expField');
const expInput = document.getElementById('expInput');

optExp.addEventListener('click', () => {
  const on = expField.classList.toggle('on');
  optExp.classList.toggle('active', on);
  if (on) setTimeout(() => expInput.focus(), 100);
});

/* ══════════════════════════════════════
   SAVE
══════════════════════════════════════ */
function doSave() {
  if (!isReady()) return;

  const mood    = document.querySelector('#moodRow .mood-btn[aria-pressed="true"]');
  const act     = document.querySelector('#actWrap .act-chip[aria-pressed="true"]');
  const entry   = {
    date:     new Date().toISOString(),
    mood:     { emoji: mood?.dataset.emoji, label: mood?.dataset.label },
    activity: act?.dataset.label,
    title:    fTitle.value.trim(),
    content:  fDesc.value.trim(),
    location: locPill.classList.contains('on') ? document.getElementById('locText').textContent : null,
    expense:  expInput.value ? parseFloat(expInput.value) : null,
    photos:   photoCount,
  };

  /* prototype: log to console, show success screen */
  console.log('[Life Diary] บันทึกแล้ว:', entry);
  document.getElementById('successOverlay').classList.add('on');
}

document.getElementById('btnSaveTop').addEventListener('click',  doSave);
document.getElementById('btnSaveMain').addEventListener('click', doSave);

function goHome() {
  location.href = 'life-diary-home.html';
}

/* back button */
document.getElementById('btnBack').addEventListener('click', () => {
  if (isReady()) {
    if (confirm('ออกโดยไม่บันทึก?')) history.back();
  } else {
    history.back();
  }
});
</script>
</body>
</html>

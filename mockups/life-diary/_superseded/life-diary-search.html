<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Diary — ค้นหาบันทึก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FBF8F3; --paper-deep:#F3EEE5;
    --ink:#3D3548; --ink-soft:#7A7186; --ink-faint:#A9A1B3;
    --line:#E7DFD3;
    --rose:#D14F86; --rose-soft:#E0689A; --rose-tint:#FBEAF1;
    --sage:#7E9E7C; --sage-tint:#EAF0E7;
    --gold:#CC9A3A; --gold-tint:#FAF1DC;
    --radius:22px;
    --shadow:0 18px 50px -22px rgba(61,53,72,.45);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    font-family:'IBM Plex Sans Thai',sans-serif; color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #EAE0EC 0%, transparent 55%),
      radial-gradient(1000px 700px at -10% 110%, #DCE7EC 0%, transparent 55%),
      #ECE7E0;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── phone frame ── */
  .phone {
    width:392px; max-width:100%; height:812px; max-height:92vh;
    background:var(--paper); border-radius:40px; overflow:hidden;
    position:relative; display:flex; flex-direction:column;
    box-shadow:var(--shadow), 0 0 0 8px #fff, 0 0 0 9px #E1D9CD;
  }

  /* ══ sticky top: header + search bar + filter chips + panels ══ */
  .srch-top {
    flex:none; background:var(--paper);
    border-bottom:1px solid transparent;
    transition:border-color .2s, box-shadow .2s;
  }
  .srch-top.scrolled {
    border-color:var(--line);
    box-shadow:0 4px 18px -8px rgba(61,53,72,.14);
  }

  /* header bar */
  .srch-hd {
    display:flex; align-items:center; gap:8px;
    padding:18px 16px 10px;
  }
  .back-btn {
    width:36px; height:36px; border:none; border-radius:50%;
    background:rgba(61,53,72,.07); color:var(--ink);
    font-size:16px; cursor:pointer; display:grid; place-items:center;
    transition:background .2s; flex:none;
  }
  .back-btn:hover { background:rgba(61,53,72,.14); }
  .srch-hd-title {
    font-family:'Mali',cursive; font-size:18px; font-weight:700; color:var(--ink); flex:1;
  }
  .srch-hd-spacer { width:36px; flex:none; }

  /* search input */
  .srch-bar { margin:0 16px 10px; position:relative; }
  .srch-bar-ico {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:16px; color:var(--ink-faint); pointer-events:none;
  }
  .srch-input {
    width:100%; border:1.5px solid var(--line); border-radius:16px;
    padding:11px 40px 11px 42px;
    font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px;
    color:var(--ink); background:#fff; outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .srch-input:focus {
    border-color:var(--rose-soft);
    box-shadow:0 0 0 3px rgba(224,104,154,.12);
  }
  .srch-input::placeholder { color:var(--ink-faint); }
  .srch-clear {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border:none; border-radius:50%;
    background:var(--ink-faint); color:#fff;
    font-size:11px; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .srch-clear.on { display:flex; }
  .srch-clear:hover { background:var(--ink-soft); }

  /* filter chips row */
  .filter-chips {
    display:flex; gap:7px; padding:0 16px 12px; overflow-x:auto;
  }
  .filter-chips::-webkit-scrollbar { height:0; }
  .fchip {
    flex:none; border:1.5px solid var(--line); background:#fff;
    border-radius:20px; padding:6px 12px;
    font-size:12px; font-weight:500; color:var(--ink-soft);
    cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:5px;
    transition:background .18s, border-color .18s, color .18s;
    white-space:nowrap;
  }
  .fchip:hover { background:var(--paper-deep); }
  .fchip.active {
    background:var(--rose-tint); border-color:var(--rose-soft);
    color:var(--rose); font-weight:600;
  }
  .fchip-ico { font-size:14px; line-height:1; }
  .fchip-arr { font-size:10px; transition:transform .22s; }
  .fchip.open .fchip-arr { transform:rotate(180deg); }

  /* filter panels — expand below chips */
  .filter-panel {
    display:none;
    padding:12px 16px 14px;
    border-top:1px solid var(--line);
    background:var(--paper-deep);
    animation:panelIn .22s ease;
  }
  .filter-panel.on { display:block; }
  @keyframes panelIn {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:none; }
  }
  .panel-lbl { font-size:11px; font-weight:600; color:var(--ink-soft); margin-bottom:9px; letter-spacing:.2px; }

  /* mood filter dots */
  .mood-filter { display:flex; gap:7px; }
  .mf-btn {
    flex:1; border:1.5px solid var(--line); border-radius:14px;
    background:#fff; padding:9px 4px 7px;
    cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:3px; font-family:inherit;
    transition:background .18s, border-color .18s, transform .15s;
  }
  .mf-btn:hover { background:var(--rose-tint); border-color:var(--rose-soft); transform:translateY(-1px); }
  .mf-dot { width:24px; height:24px; border-radius:50%; box-shadow:inset 0 -2px 5px rgba(0,0,0,.1); }
  .mf-lbl { font-size:9.5px; color:var(--ink-soft); font-weight:500; }
  .mf-btn[aria-pressed="true"] {
    background:var(--rose-tint); border-color:var(--rose-soft);
    box-shadow:0 4px 10px -4px rgba(209,79,134,.3);
  }
  .mf-btn[aria-pressed="true"] .mf-lbl { color:var(--rose); font-weight:700; }

  /* activity filter wrap chips */
  .act-filter { display:flex; gap:7px; flex-wrap:wrap; }
  .af-btn {
    border:1.5px solid var(--line); background:#fff; border-radius:20px;
    padding:6px 12px; font-size:12px; font-weight:500; color:var(--ink-soft);
    cursor:pointer; font-family:inherit;
    transition:background .18s, border-color .18s;
  }
  .af-btn:hover { background:var(--rose-tint); border-color:var(--rose-soft); }
  .af-btn[aria-pressed="true"] {
    background:var(--rose-tint); border-color:var(--rose-soft);
    color:var(--rose); font-weight:600;
  }

  /* place filter list */
  .place-list { display:flex; flex-direction:column; gap:6px; }
  .pl-item {
    display:flex; align-items:center; gap:10px;
    padding:6px 2px; cursor:pointer; border-radius:10px;
    transition:background .18s;
  }
  .pl-item:hover { background:rgba(209,79,134,.05); }
  .pl-check {
    width:18px; height:18px; border-radius:5px; flex:none;
    border:1.5px solid var(--line); background:#fff;
    display:grid; place-items:center;
    transition:background .18s, border-color .18s;
    font-size:11px; font-weight:700; color:#fff;
  }
  .pl-item[aria-pressed="true"] .pl-check {
    background:var(--rose); border-color:var(--rose);
  }
  .pl-item[aria-pressed="true"] .pl-check::after { content:"✓"; }
  .pl-name { font-size:13px; color:var(--ink); flex:1; }
  .pl-cnt { font-size:11px; color:var(--ink-faint); }

  /* ══ scrollable results body ══ */
  .srch-body { flex:1; overflow-y:auto; padding:0 16px 8px; }
  .srch-body::-webkit-scrollbar { width:0; }

  /* results header */
  .results-hd {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 2px 10px;
  }
  .results-count { font-size:12px; color:var(--ink-soft); font-weight:600; }
  .results-count b { color:var(--rose); }
  .sort-btn {
    border:none; background:none; cursor:pointer; font-family:inherit;
    font-size:12px; color:var(--ink-soft);
    padding:4px 9px; border-radius:10px;
    display:flex; align-items:center; gap:4px;
    transition:background .2s, color .2s;
  }
  .sort-btn:hover { background:var(--rose-tint); color:var(--rose); }

  /* active filters summary strip */
  .active-filters {
    display:none; gap:6px; flex-wrap:wrap; padding:0 2px 10px;
  }
  .active-filters.on { display:flex; }
  .af-tag {
    display:flex; align-items:center; gap:5px;
    background:var(--rose-tint); border:1px solid var(--rose-soft);
    border-radius:20px; padding:4px 10px; font-size:11px;
    color:var(--rose); font-weight:600;
  }
  .af-tag-x {
    border:none; background:none; color:var(--rose); cursor:pointer;
    font-size:13px; line-height:1; padding:0; margin-left:2px;
  }
  .af-clear-all {
    border:none; background:none; cursor:pointer; font-family:inherit;
    font-size:11px; color:var(--ink-faint); text-decoration:underline;
    padding:4px 0; align-self:center;
  }

  /* entry card */
  .entry {
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    margin:0 2px 12px; overflow:hidden; cursor:pointer;
    transition:transform .15s, box-shadow .15s;
  }
  .entry:hover { transform:translateY(-2px); box-shadow:0 8px 24px -10px rgba(61,53,72,.22); }
  .entry-bar { height:5px; }
  .entry-body { padding:13px 15px 10px; }
  .entry-meta { display:flex; align-items:center; gap:7px; margin-bottom:6px; flex-wrap:wrap; }
  .entry-mood-dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .entry-time, .entry-place { font-size:11px; color:var(--ink-soft); }
  .entry-place::before { content:"· "; }
  .entry-title { font-family:'Mali',cursive; font-size:15px; font-weight:600; color:var(--ink); margin-bottom:4px; line-height:1.35; }
  .entry-preview { font-size:12.5px; color:var(--ink-soft); line-height:1.5; }
  .entry-foot { display:flex; align-items:center; gap:6px; padding:8px 15px 12px; border-top:1px solid var(--line); flex-wrap:wrap; }
  .chip { font-size:10px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .chip-rose { background:var(--rose-tint); color:var(--rose); }
  .chip-gold { background:var(--gold-tint); color:var(--gold); }
  .chip-sage { background:var(--sage-tint); color:var(--sage); }
  .chip-blue { background:#EAF0F5; color:#5E7A8A; }
  .entry-spend { margin-left:auto; font-size:12px; font-weight:700; color:var(--gold); }

  /* search highlight */
  mark { background:var(--gold-tint); color:var(--gold); border-radius:3px; padding:0 2px; font-weight:600; font-style:normal; }

  /* empty results */
  .no-results {
    display:flex; flex-direction:column; align-items:center;
    padding:44px 20px; text-align:center; gap:10px;
  }
  .no-ico { font-size:52px; opacity:.55; line-height:1; }
  .no-title { font-family:'Mali',cursive; font-size:17px; font-weight:600; color:var(--ink); }
  .no-sub { font-size:12.5px; color:var(--ink-soft); line-height:1.6; }
  .no-reset {
    margin-top:6px; border:none; cursor:pointer; font-family:'Mali',cursive;
    font-size:14px; font-weight:600; color:var(--rose);
    background:var(--rose-tint); border-radius:20px; padding:10px 20px;
  }

  /* ══ bottom navigation ══ */
  .bottom-nav {
    flex:none; height:60px; background:var(--paper);
    border-top:1px solid var(--line); display:flex; align-items:stretch;
  }
  .bnav-tab {
    flex:1; border:none; background:none; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; color:var(--ink-faint); transition:color .2s;
  }
  .bnav-tab.active { color:var(--rose); }
  .bnav-tab:hover:not(.active) { color:var(--ink-soft); }
  .bnav-ico { font-size:20px; line-height:1; }
  .bnav-lbl { font-size:9.5px; font-weight:500; }

  @media(prefers-reduced-motion:reduce){
    *, *::before, *::after { animation:none!important; transition:none!important; }
  }
</style>
</head>

  </div><!-- /srch-top -->

  <!-- ══ results body ══ -->
  <div class="srch-body" id="srchBody">

    <div class="results-hd">
      <div class="results-count" id="resultsCount">บันทึกทั้งหมด <b>7</b> รายการ</div>
      <button class="sort-btn" id="sortBtn">เรียงตาม: ล่าสุด ↕</button>

    <!-- active filter tags -->
    <div class="active-filters" id="activeFilters"></div>

    <!-- entry cards -->
    <div id="resultsList"></div>

  </div><!-- /srch-body -->

  <!-- ══ bottom nav ══ -->
  <nav class="bottom-nav">
    <button class="bnav-tab" onclick="location.href='life-diary-home.html'">
      <span class="bnav-ico">🏠</span><span class="bnav-lbl">หน้าแรก</span>

    <button class="bnav-tab" onclick="location.href='life-diary-timeline.html'">

/* ══════════════════════════════════════
   FILTER STATE
══════════════════════════════════════ */
const S = {
  text:'', moods:new Set(), acts:new Set(), places:new Set(),
  hasPhoto:false, hasSpend:false,
  openPanel:null, sortBy:'latest',
};

/* ══════════════════════════════════════
   BUILD DYNAMIC FILTER OPTIONS
══════════════════════════════════════ */
// activity chips
const allActs = [...new Set(ALL.map(e => e.act))];
const actFilterEl = document.getElementById('actFilter');
allActs.forEach(a => {
  const b = document.createElement('button');
  b.className = 'af-btn'; b.dataset.act = a; b.textContent = a;
  b.setAttribute('aria-pressed','false');
  b.addEventListener('click', () => {
    const on = b.getAttribute('aria-pressed') === 'true';
    b.setAttribute('aria-pressed', on ? 'false':'true');
    on ? S.acts.delete(a) : S.acts.add(a);
    refreshChip('fcAct', S.acts.size > 0);
    render();
  });
  actFilterEl.appendChild(b);
});

// place list
const allPlaces = [...new Set(ALL.map(e => e.place))];
const placeListEl = document.getElementById('placeList');
allPlaces.forEach(pl => {
  const cnt = ALL.filter(e => e.place === pl).length;
  const d = document.createElement('div');
  d.className = 'pl-item'; d.setAttribute('aria-pressed','false');
  d.innerHTML = `<div class="pl-check"></div><span class="pl-name">${pl}</span><span class="pl-cnt">${cnt} บันทึก</span>`;
  d.addEventListener('click', () => {
    const on = d.getAttribute('aria-pressed') === 'true';
    d.setAttribute('aria-pressed', on ? 'false':'true');
    on ? S.places.delete(pl) : S.places.add(pl);
    refreshChip('fcPlace', S.places.size > 0);
    render();
  });
  placeListEl.appendChild(d);
});

/* ══════════════════════════════════════
   FILTER CHIP LOGIC (open/close panels)
══════════════════════════════════════ */
document.querySelectorAll('.fchip[data-panel]').forEach(btn => {
  btn.addEventListener('click', () => {
    const pid = btn.dataset.panel;
    const isOpen = S.openPanel === pid;
    closeAllPanels();
    if (!isOpen) {
      S.openPanel = pid;
      document.getElementById(pid).classList.add('on');
      btn.classList.add('open');
    }
  });
});

function closeAllPanels() {
  S.openPanel = null;
  document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.fchip[data-panel]').forEach(b => b.classList.remove('open'));
}

function refreshChip(id, active) {
  document.getElementById(id).classList.toggle('active', active);
}

/* mood buttons */
document.querySelectorAll('.mf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mood;
    const on = btn.getAttribute('aria-pressed') === 'true';
    btn.setAttribute('aria-pressed', on ? 'false':'true');
    on ? S.moods.delete(m) : S.moods.add(m);
    refreshChip('fcMood', S.moods.size > 0);
    render();
  });
});

/* photo toggle */
document.getElementById('fcPhoto').addEventListener('click', function() {
  S.hasPhoto = !S.hasPhoto;
  this.classList.toggle('active', S.hasPhoto);
  render();
});

/* spend toggle */
document.getElementById('fcSpend').addEventListener('click', function() {
  S.hasSpend = !S.hasSpend;
  this.classList.toggle('active', S.hasSpend);
  render();
});

/* ══════════════════════════════════════
   SEARCH INPUT
══════════════════════════════════════ */
const inp = document.getElementById('srchInput');
const clr = document.getElementById('srchClear');

inp.addEventListener('input', () => {
  S.text = inp.value.trim();
  clr.classList.toggle('on', S.text.length > 0);
  closeAllPanels();
  render();
});
clr.addEventListener('click', () => {
  inp.value = ''; S.text = '';
  clr.classList.remove('on');
  render(); inp.focus();
});

/* ══════════════════════════════════════
   SORT
══════════════════════════════════════ */
const sortCycles = [
  { key:'latest',   label:'ล่าสุด' },
  { key:'oldest',   label:'เก่าสุด' },
  { key:'spend-hi', label:'ใช้จ่ายสูงสุด' },
  { key:'mood-hi',  label:'อารมณ์ดีสุด' },
];
let sortIdx = 0;
document.getElementById('sortBtn').addEventListener('click', function() {
  sortIdx = (sortIdx + 1) % sortCycles.length;
  S.sortBy = sortCycles[sortIdx].key;
  this.textContent = `เรียงตาม: ${sortCycles[sortIdx].label} ↕`;
  render();
});

/* ══════════════════════════════════════
   FILTER + SORT
══════════════════════════════════════ */
const moodOrder = ['ดีมาก','ดี','เฉยๆ','เหนื่อย','แย่'];

function applyFilters() {
  const q = S.text.toLowerCase();
  return ALL.filter(e => {
    if (q && ![e.title, e.preview, e.place, ...e.tags].some(t => t.toLowerCase().includes(q))) return false;
    if (S.moods.size  > 0 && !S.moods.has(e.mood))   return false;
    if (S.acts.size   > 0 && !S.acts.has(e.act))     return false;
    if (S.places.size > 0 && !S.places.has(e.place)) return false;
    if (S.hasPhoto && !e.hasPhoto)  return false;
    if (S.hasSpend && e.spend <= 0) return false;
    return true;
  }).sort((a,b) => {
    if (S.sortBy === 'oldest')   return b.id - a.id;
    if (S.sortBy === 'spend-hi') return b.spend - a.spend;
    if (S.sortBy === 'mood-hi')  return moodOrder.indexOf(a.mood) - moodOrder.indexOf(b.mood);
    return a.id - b.id; // latest = lower id = more recent in this demo
  });
}

/* ══════════════════════════════════════
   ACTIVE FILTER TAGS STRIP
══════════════════════════════════════ */
function buildFilterTags() {
  const tags = [];
  S.moods.forEach(m    => tags.push({ label:`😊 ${m}`,     clear:() => { S.moods.delete(m);    syncMoodBtns();       refreshChip('fcMood',  S.moods.size>0);  render(); } }));
  S.acts.forEach(a     => tags.push({ label:`🏃 ${a}`,     clear:() => { S.acts.delete(a);     syncActBtns();        refreshChip('fcAct',   S.acts.size>0);   render(); } }));
  S.places.forEach(pl  => tags.push({ label:`📍 ${pl}`,    clear:() => { S.places.delete(pl);  syncPlaceBtns();      refreshChip('fcPlace', S.places.size>0); render(); } }));
  if (S.hasPhoto) tags.push({ label:'🖼️ มีรูป',  clear:() => { S.hasPhoto=false; document.getElementById('fcPhoto').classList.remove('active'); render(); } });
  if (S.hasSpend) tags.push({ label:'💰 มีรายจ่าย', clear:() => { S.hasSpend=false; document.getElementById('fcSpend').classList.remove('active'); render(); } });
  return tags;
}

function syncMoodBtns()  { document.querySelectorAll('.mf-btn').forEach(b  => b.setAttribute('aria-pressed', S.moods.has(b.dataset.mood) ? 'true':'false')); }
function syncActBtns()   { document.querySelectorAll('.af-btn').forEach(b  => b.setAttribute('aria-pressed', S.acts.has(b.dataset.act)   ? 'true':'false')); }
function syncPlaceBtns() { document.querySelectorAll('.pl-item').forEach(d => d.setAttribute('aria-pressed', S.places.has(d.querySelector('.pl-name').textContent) ? 'true':'false')); }

function clearAll() {
  S.moods.clear(); S.acts.clear(); S.places.clear();
  S.hasPhoto = false; S.hasSpend = false;
  syncMoodBtns(); syncActBtns(); syncPlaceBtns();
  ['fcMood','fcAct','fcPlace','fcPhoto','fcSpend'].forEach(id => document.getElementById(id).classList.remove('active'));
  render();
}

/* ══════════════════════════════════════
   HIGHLIGHT + RENDER
══════════════════════════════════════ */
function hl(txt) {
  if (!S.text) return txt;
  const re = new RegExp(`(${S.text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return txt.replace(re, '<mark>$1</mark>');
}

function buildCard(e) {
  const photoChip = e.hasPhoto ? `<span class="chip chip-blue">🖼️ รูป</span>` : '';
  const spend = e.spend > 0 ? `<span class="entry-spend">฿${e.spend.toLocaleString()}</span>` : '';
  return `
    <div class="entry">
      <div class="entry-bar" style="background:linear-gradient(90deg,${e.grad})"></div>
      <div class="entry-body">
        <div class="entry-meta">
          <div class="entry-mood-dot" style="background:${e.moodDot}"></div>
          <span class="entry-time">${hl(e.date)} ${e.time}</span>
          <span class="entry-place">${hl(e.place)}</span>
        </div>
        <div class="entry-title">${hl(e.title)}</div>
        <div class="entry-preview">${hl(e.preview)}</div>
      </div>
      <div class="entry-foot">
        <span class="chip chip-rose">😊 ${e.mood}</span>
        <span class="chip chip-sage">${e.act}</span>
        ${photoChip}${spend}
      </div>
    </div>`;
}

const listEl   = document.getElementById('resultsList');
const countEl  = document.getElementById('resultsCount');
const filtersEl= document.getElementById('activeFilters');

function render() {
  const results = applyFilters();

  // results count
  const total = S.text || S.moods.size || S.acts.size || S.places.size || S.hasPhoto || S.hasSpend;
  countEl.innerHTML = total
    ? `พบ <b>${results.length}</b> จาก ${ALL.length} รายการ`
    : `บันทึกทั้งหมด <b>${results.length}</b> รายการ`;

  // active filter tags strip
  const tags = buildFilterTags();
  const hasFilters = tags.length > 0;
  filtersEl.classList.toggle('on', hasFilters);
  if (hasFilters) {
    filtersEl.innerHTML = tags.map((t,i) =>
      `<span class="af-tag">${t.label}<button class="af-tag-x" data-idx="${i}">×</button></span>`
    ).join('') + `<button class="af-clear-all" id="afClearAll">ล้างทั้งหมด</button>`;
    filtersEl.querySelectorAll('.af-tag-x').forEach(btn => {
      btn.addEventListener('click', () => tags[+btn.dataset.idx].clear());
    });
    document.getElementById('afClearAll').addEventListener('click', clearAll);
  }

  // entry list
  if (results.length === 0) {
    listEl.innerHTML = `
      <div class="no-results">
        <div class="no-ico">🔍</div>
        <div class="no-title">ไม่พบบันทึกที่ตรงกัน</div>
        <div class="no-sub">ลองเปลี่ยนคำค้นหา<br>หรือลบตัวกรองออกบางส่วน</div>
        <button class="no-reset" onclick="clearAll();document.getElementById('srchInput').value='';document.getElementById('srchClear').classList.remove('on');">ล้างตัวกรองทั้งหมด</button>
      </div>`;
    return;
  }
  listEl.innerHTML = results.map(buildCard).join('');
}

/* ══════════════════════════════════════
   SCROLL SHADOW
══════════════════════════════════════ */
document.getElementById('srchBody').addEventListener('scroll', function() {
  document.getElementById('srchTop').classList.toggle('scrolled', this.scrollTop > 2);
});

/* initial render */
render();
</script>
</body>
</html>

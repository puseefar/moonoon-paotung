<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Diary — ค้นหา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F0F4FB;
    --surface:   #FFFFFF;
    --ink:       #1A1630;
    --ink-soft:  #6B6585;
    --ink-faint: #AFAABB;
    --line:      #EDEAF5;
    --rose:      #D14F86;
    --rose-tint: #FBEAF1;
    --rose-mid:  #C93E7A;
    --sage:      #4FAD86;
    --sage-tint: #E6F7F0;
    --gold:      #CC9A3A;
    --gold-tint: #FBF3E2;
    --blue:      #3D8EF0;
    --blue-tint: #EDF4FE;
    --purple:    #7C5CBF;
    --purple-tint:#F0EBFF;
    --radius:    18px;
    --shadow-sm: 0 4px 16px -4px rgba(26,22,48,.10);
    --shadow-md: 0 10px 28px -8px rgba(26,22,48,.15);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    font-family:'IBM Plex Sans Thai', sans-serif;
    background:
      radial-gradient(900px 600px at 70% -5%, #D8E6F8 0%, transparent 60%),
      radial-gradient(800px 600px at 0% 110%, #E0D8F8 0%, transparent 60%),
      #EBF0FB;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Phone ── */
  .phone {
    width:392px; max-width:100%; height:812px; max-height:92vh;
    background:var(--bg);
    border-radius:40px; overflow:hidden; position:relative;
    box-shadow:0 28px 72px -16px rgba(26,22,48,.30), 0 0 0 8px #fff, 0 0 0 9px #DDD8EE;
    display:flex; flex-direction:column;
  }

  /* ════════════════════════════
     SEARCH HEADER
  ════════════════════════════ */
  .srch-head {
    flex:none; padding:16px 20px 12px;
    background:var(--bg); border-bottom:1px solid var(--line);
    position:relative; z-index:5;
  }
  .srch-title-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .srch-title {
    font-family:'Mali', cursive; font-size:20px; font-weight:700; color:var(--ink);
  }
  .head-icon-btn {
    width:38px; height:38px; border-radius:50%;
    background:var(--surface); border:none; cursor:pointer;
    display:grid; place-items:center; font-size:17px;
    box-shadow:var(--shadow-sm); color:var(--ink-soft);
    transition:background .18s, transform .15s;
  }
  .head-icon-btn:hover  { background:var(--purple-tint); color:var(--purple); }
  .head-icon-btn:active { transform:scale(.91); }

  /* Search input bar */
  .search-bar {
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border-radius:16px;
    padding:0 16px;
    box-shadow:var(--shadow-sm);
    border:1.5px solid var(--line);
    transition:border-color .2s, box-shadow .2s;
  }
  .search-bar:focus-within {
    border-color:rgba(209,79,134,.35);
    box-shadow:0 0 0 3px rgba(209,79,134,.08), var(--shadow-sm);
  }
  .srch-ico { font-size:18px; color:var(--ink-soft); flex:none; }
  .srch-input {
    flex:1; border:none; outline:none; background:transparent;
    font-family:'IBM Plex Sans Thai', sans-serif;
    font-size:14.5px; color:var(--ink); padding:13px 0;
  }
  .srch-input::placeholder { color:var(--ink-faint); }
  .srch-clear {
    width:24px; height:24px; border-radius:50%; background:var(--line);
    border:none; cursor:pointer; font-size:12px; color:var(--ink-soft);
    display:none; place-items:center; flex:none;
    transition:background .15s;
  }
  .srch-clear.show { display:grid; }
  .srch-clear:hover { background:var(--rose-tint); color:var(--rose); }

  /* ════════════════════════════
     FILTER CHIPS ROW
  ════════════════════════════ */
  .filter-row {
    flex:none; padding:10px 20px;
    display:flex; gap:8px; overflow-x:auto;
    border-bottom:1px solid var(--line);
    background:var(--bg);
  }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip {
    flex:none; height:34px; padding:0 14px;
    border:1.5px solid var(--line); border-radius:18px;
    background:var(--surface); cursor:pointer; font-family:inherit;
    font-size:12.5px; font-weight:500; color:var(--ink-soft);
    display:flex; align-items:center; gap:5px;
    transition:border-color .15s, background .15s, color .15s;
    white-space:nowrap;
  }
  .filter-chip:hover   { border-color:rgba(209,79,134,.3); background:var(--rose-tint); color:var(--rose); }
  .filter-chip:active  { transform:scale(.96); }
  .filter-chip.active  {
    border-color:var(--rose); background:var(--rose-tint);
    color:var(--rose); font-weight:700;
  }
  .filter-chip-ico { font-size:14px; }

  /* ════════════════════════════
     SCROLLABLE BODY
  ════════════════════════════ */
  .srch-body {
    flex:1; overflow-y:auto; padding:0 0 80px;
  }
  .srch-body::-webkit-scrollbar { width:0; }

  /* ── Section header ── */
  .sec-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 8px;
  }
  .sec-head-lbl {
    font-size:11.5px; font-weight:700; color:var(--ink-faint);
    letter-spacing:.4px; text-transform:uppercase;
  }
  .sec-head-action {
    border:none; background:none; cursor:pointer;
    font-size:12px; color:var(--rose); font-weight:600; font-family:inherit;
  }
  .sec-head-action:hover { opacity:.7; }

  /* ── Recent search tags ── */
  .recent-wrap {
    padding:2px 20px 12px;
    display:flex; gap:7px; flex-wrap:wrap;
  }
  .recent-tag {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface); border:1.5px solid var(--line);
    border-radius:20px; padding:6px 12px;
    font-size:12.5px; color:var(--ink); font-weight:500; cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .recent-tag:hover { border-color:rgba(209,79,134,.3); background:var(--rose-tint); color:var(--rose); }
  .recent-tag-ico { font-size:13px; }

  /* ── Mood filter quick picks ── */
  .mood-quick {
    padding:0 20px 14px;
    display:flex; gap:10px;
  }
  .mood-qbtn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:var(--surface); border:1.5px solid var(--line); border-radius:16px;
    padding:10px 4px; cursor:pointer; font-family:inherit;
    transition:border-color .15s, background .15s, transform .15s;
  }
  .mood-qbtn:hover  { border-color:rgba(209,79,134,.3); background:var(--rose-tint); transform:translateY(-1px); }
  .mood-qbtn.active { border-color:var(--rose); background:var(--rose-tint); }
  .mood-qbtn .mq-ico { font-size:22px; line-height:1; }
  .mood-qbtn .mq-lbl { font-size:9.5px; font-weight:600; color:var(--ink-soft); }
  .mood-qbtn.active .mq-lbl { color:var(--rose); }

  /* ── RESULT / ENTRY CARDS ── */
  .result-list { padding:0 16px; }

  .rcard {
    background:var(--surface); border-radius:var(--radius);
    box-shadow:var(--shadow-sm); margin-bottom:10px; overflow:hidden;
    cursor:pointer; text-decoration:none; color:inherit; display:block;
    transition:transform .15s, box-shadow .18s;
  }
  .rcard:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .rcard:active { transform:scale(.98); }

  .rcard-accent { height:4px; }
  .rcard-body   { padding:12px 14px 10px; display:flex; gap:10px; align-items:flex-start; }
  .rcard-thumb  {
    width:58px; height:58px; border-radius:12px; object-fit:cover; flex:none;
    box-shadow:0 3px 10px -3px rgba(26,22,48,.2);
  }
  .rcard-thumb-placeholder {
    width:58px; height:58px; border-radius:12px; flex:none;
    background:var(--bg); display:grid; place-items:center;
    font-size:24px; border:1.5px solid var(--line);
  }
  .rcard-info { flex:1; min-width:0; }
  .rcard-meta { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .rmood-dot  { width:7px; height:7px; border-radius:50%; flex:none; }
  .rcard-date { font-size:10.5px; color:var(--ink-soft); font-weight:500; }
  .rcard-title {
    font-family:'Mali', cursive; font-size:14.5px; font-weight:700; color:var(--ink);
    line-height:1.3; margin-bottom:3px;
    display:-webkit-box; -webkit-box-orient:vertical;
    -webkit-line-clamp:1; line-clamp:1; overflow:hidden;
  }
  .rcard-preview {
    font-size:12px; color:var(--ink-soft); line-height:1.5;
    display:-webkit-box; -webkit-box-orient:vertical;
    -webkit-line-clamp:2; line-clamp:2; overflow:hidden;
  }
  .rcard-foot {
    display:flex; align-items:center; gap:6px;
    padding:7px 14px 10px; border-top:1px solid var(--line);
  }
  .chip { font-size:10px; font-weight:600; padding:3px 8px; border-radius:10px; display:flex; align-items:center; gap:3px; }
  .chip-loc  { background:var(--sage-tint); color:var(--sage); }
  .chip-act  { background:var(--blue-tint); color:var(--blue); }
  .chip-mood { background:var(--rose-tint); color:var(--rose); }
  .chip-gold { background:var(--gold-tint); color:var(--gold); }
  .rcard-spend { margin-left:auto; font-size:11.5px; font-weight:700; color:var(--gold); }

  /* highlight matched text */
  mark {
    background:rgba(209,79,134,.15); color:var(--rose);
    border-radius:3px; padding:0 2px; font-weight:700;
  }

  /* ── Empty state ── */
  .empty-state {
    display:none; flex-direction:column; align-items:center;
    padding:48px 32px; text-align:center;
  }
  .empty-state.show { display:flex; }
  .empty-ico   { font-size:52px; margin-bottom:14px; }
  .empty-title {
    font-family:'Mali', cursive; font-size:18px; font-weight:700;
    color:var(--ink); margin-bottom:6px;
  }
  .empty-sub { font-size:13px; color:var(--ink-soft); line-height:1.6; }

  /* ── Loading skeleton ── */
  .skeleton {
    background:linear-gradient(90deg, var(--line) 25%, #f0edf8 50%, var(--line) 75%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite; border-radius:8px;
  }
  @keyframes shimmer {
    from { background-position:200% 0; }
    to   { background-position:-200% 0; }
  }

  /* ════════════════════════════
     BOTTOM NAV
  ════════════════════════════ */
  .bottom-nav {
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    height:64px;
    background:rgba(240,244,251,.94);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-top:1px solid rgba(255,255,255,.8);
    display:flex; align-items:stretch;
  }
  .bnav-tab {
    flex:1; border:none; background:none; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; color:var(--ink-faint); transition:color .2s;
  }
  .bnav-tab.active { color:var(--rose); }
  .bnav-tab:hover:not(.active) { color:var(--ink-soft); }
  .bnav-ico { font-size:22px; line-height:1; }
  .bnav-lbl { font-size:9.5px; font-weight:600; }
  .bnav-add {
    flex:none; width:52px; height:52px; margin:auto;
    background:linear-gradient(145deg, #E0609A, var(--rose-mid));
    border-radius:50%; border:none; cursor:pointer; font-size:24px;
    color:#fff; display:grid; place-items:center;
    box-shadow:0 8px 20px -6px rgba(209,79,134,.5);
    transition:transform .15s, box-shadow .15s;
  }
  .bnav-add:hover  { transform:translateY(-2px); }
  .bnav-add:active { transform:scale(.93); }
</style>
</head>

  <!-- BODY -->
  <div class="srch-body" id="srchBody">

        <div class="recent-tag"><span class="recent-tag-ico">🕐</span>ออกกำลัง</div>
      </div>

      <div class="sec-head">
        <span class="sec-head-lbl">ค้นหาตามความรู้สึก</span>
      </div>
      <div class="mood-quick" id="moodQuick">
        <button class="mood-qbtn" data-mood="great">
          <span class="mq-ico">😄</span><span class="mq-lbl">ดีมาก</span>
        </button>
        <button class="mood-qbtn" data-mood="good">
          <span class="mq-ico">😊</span><span class="mq-lbl">ดี</span>
        </button>
        <button class="mood-qbtn" data-mood="ok">
          <span class="mq-ico">😐</span><span class="mq-lbl">สบายๆ</span>
        </button>
        <button class="mood-qbtn" data-mood="tired">
          <span class="mq-ico">😔</span><span class="mq-lbl">เหนื่อย</span>
        </button>
        <button class="mood-qbtn" data-mood="fight">
          <span class="mq-ico">😞</span><span class="mq-lbl">สู้ๆ</span>
        </button>
      </div>

      <div class="sec-head">
        <span class="sec-head-lbl">บันทึกล่าสุด</span>
      </div>
      <div class="result-list" id="recentEntries"></div>
    </div>

    <!-- RESULT STATE -->
    <div id="resultState" style="display:none;">
      <div class="sec-head" id="resultHead">
        <span class="sec-head-lbl" id="resultCount"></span>
      </div>
      <div class="result-list" id="resultList"></div>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-ico">🔎</div>
      <div class="empty-title">ไม่พบบันทึก</div>
      <div class="empty-sub">ลองค้นหาด้วยคำอื่น<br>หรือใช้ตัวกรองเพื่อค้นหาแบบอื่น</div>
    </div>

  </div><!-- /srch-body -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav-tab" onclick="location.href='life-diary-home.html'">
      <span class="bnav-ico">🏠</span><span class="bnav-lbl">หน้าแรก</span>
    </button>
    <button class="bnav-tab" onclick="location.href='life-diary-timeline.html'">
      <span class="bnav-ico">📅</span><span class="bnav-lbl">ไทม์ไลน์</span>
    </button>
    <button class="bnav-add" onclick="location.href='life-diary-composer.html'" title="เพิ่มบันทึก">＋</button>
    <button class="bnav-tab active">
      <span class="bnav-ico">🔍</span><span class="bnav-lbl">ค้นหา</span>
    </button>
    <button class="bnav-tab">
      <span class="bnav-ico">✏️</span><span class="bnav-lbl">บันทึก</span>
    </button>
  </nav>

</div><!-- /phone -->

    location:'ตลาดนัด โคราช', spend:380,
    accent:'linear-gradient(90deg,#B0A8E9,#DDD8F8)',
    thumb:'https://i.pinimg.com/736x/e0/b8/7c/e0b87cf298f804a3de97bfbbf8fefdbd.jpg',
    tags:['ตลาดนัด','ต้นไม้','วันหยุด','โคราช'],
  },
];

/* ── Build card HTML ── */
function buildCard(e, highlight) {
  const hl = s => highlight ? s.replace(new RegExp(`(${highlight})`, 'gi'), '<mark>$1</mark>') : s;
  return `
    <a class="rcard" href="life-diary-entry.html">
      <div class="rcard-accent" style="background:${e.accent}"></div>
      <div class="rcard-body">
        ${e.thumb
          ? `<img class="rcard-thumb" src="${e.thumb}" alt="">`
          : `<div class="rcard-thumb-placeholder">${e.moodIco}</div>`}
        <div class="rcard-info">
          <div class="rcard-meta">
            <div class="rmood-dot" style="background:${e.moodColor}"></div>
            <span class="rcard-date">${e.date} · ${e.time} น.</span>
          </div>
          <div class="rcard-title">${hl(e.title)}</div>
          <div class="rcard-preview">${hl(e.preview)}</div>
        </div>
      </div>
      <div class="rcard-foot">
        <span class="chip chip-mood">${e.moodIco} ${e.mood}</span>
        <span class="chip chip-act">${e.actIco} ${e.activity}</span>
        ${e.location ? `<span class="chip chip-loc">📍 ${e.location.split(',')[0]}</span>` : ''}
        ${e.spend > 0 ? `<span class="rcard-spend">฿${e.spend.toLocaleString()}</span>` : ''}
      </div>
    </a>`;
}

/* ── Render recent entries ── */
const recentEl = document.getElementById('recentEntries');
ENTRIES.slice(0,3).forEach(e => { recentEl.innerHTML += buildCard(e, ''); });

/* ══════════════════════════════════════
   FILTER CHIPS
══════════════════════════════════════ */
let activeFilter = 'all';
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    runSearch(document.getElementById('srchInput').value.trim());
  });
});

/* ══════════════════════════════════════
   MOOD QUICK FILTER
══════════════════════════════════════ */
let activeMood = null;
document.querySelectorAll('.mood-qbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeMood = null;
    } else {
      document.querySelectorAll('.mood-qbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeMood = btn.dataset.mood;
    }
    const q = btn.classList.contains('active') ? btn.querySelector('.mq-ico').textContent : '';
    document.getElementById('srchInput').value = q;
    runSearch(q);
  });
});

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
const srchInput = document.getElementById('srchInput');
const srchClear = document.getElementById('srchClear');
const defaultState = document.getElementById('defaultState');
const resultState  = document.getElementById('resultState');
const emptyState   = document.getElementById('emptyState');

srchInput.addEventListener('input', () => {
  const q = srchInput.value.trim();
  srchClear.classList.toggle('show', q.length > 0);
  runSearch(q);
});

srchClear.addEventListener('click', () => {
  srchInput.value = '';
  srchClear.classList.remove('show');
  document.querySelectorAll('.mood-qbtn').forEach(b => b.classList.remove('active'));
  activeMood = null;
  showDefault();
});

function showDefault() {
  defaultState.style.display = '';
  resultState.style.display  = 'none';
  emptyState.classList.remove('show');
}

function runSearch(q) {
  if (!q) { showDefault(); return; }

  const lower = q.toLowerCase();
  const results = ENTRIES.filter(e => {
    const matchText = e.title.toLowerCase().includes(lower)
                   || e.preview.toLowerCase().includes(lower)
                   || e.tags.some(t => t.toLowerCase().includes(lower))
                   || (e.location && e.location.toLowerCase().includes(lower));

    if (activeFilter === 'photo')    return matchText && !!e.thumb;
    if (activeFilter === 'location') return matchText && !!e.location;
    if (activeFilter === 'expense')  return matchText && e.spend > 0;
    return matchText;
  });

  defaultState.style.display = 'none';

  if (results.length === 0) {
    resultState.style.display = 'none';
    emptyState.classList.add('show');
    return;
  }

  emptyState.classList.remove('show');
  resultState.style.display = '';
  document.getElementById('resultCount').textContent = `พบ ${results.length} รายการ`;
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  results.forEach(e => { list.innerHTML += buildCard(e, q); });
}

/* ── Clear recent ── */
document.getElementById('clearRecent').addEventListener('click', () => {
  document.getElementById('recentWrap').innerHTML =
    '<span style="font-size:12px;color:var(--ink-faint);">ไม่มีประวัติการค้นหา</span>';
});

/* ── Recent tag click ── */
document.getElementById('recentWrap').addEventListener('click', e => {
  const tag = e.target.closest('.recent-tag');
  if (!tag) return;
  const q = tag.textContent.trim();
  srchInput.value = q;
  srchClear.classList.add('show');
  runSearch(q);
});
</script>
</body>
</html>
